<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1650" height="760" viewBox="0 0 1650 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .sub { font: 400 16px Arial, sans-serif; fill: #334155; }
      .lane { stroke: #94a3b8; stroke-width: 1.4; }
      .lane-title { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .msg { stroke: #334155; stroke-width: 2.1; marker-end: url(#arrow); }
      .label { font: 400 13px Arial, sans-serif; fill: #1e293b; }
      .box { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 1.3; rx: 8; ry: 8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1650" height="760" fill="#f8fafc"/>
  <text x="40" y="44" class="title">EIP Request Flow</text>
  <text x="40" y="70" class="sub">Typical request lifecycle in stub mode (same shape for live mode with provider swap)</text>

  <line class="lane" x1="140" y1="120" x2="140" y2="700"/>
  <line class="lane" x1="470" y1="120" x2="470" y2="700"/>
  <line class="lane" x1="800" y1="120" x2="800" y2="700"/>
  <line class="lane" x1="1130" y1="120" x2="1130" y2="700"/>
  <line class="lane" x1="1460" y1="120" x2="1460" y2="700"/>

  <text x="90" y="108" class="lane-title">User</text>
  <text x="425" y="108" class="lane-title">API Layer</text>
  <text x="730" y="108" class="lane-title">Provider Registry</text>
  <text x="1070" y="108" class="lane-title">Pillar Logic</text>
  <text x="1400" y="108" class="lane-title">Store / Event / LLM</text>

  <rect class="box" x="390" y="155" width="160" height="40"/>
  <text x="410" y="180" class="label">Endpoint handler</text>

  <rect class="box" x="725" y="220" width="150" height="40"/>
  <text x="740" y="245" class="label">Resolve providers</text>

  <rect class="box" x="1048" y="305" width="165" height="42"/>
  <text x="1068" y="331" class="label">Run pillar workflow</text>

  <rect class="box" x="1375" y="390" width="170" height="45"/>
  <text x="1395" y="418" class="label">Persist / emit / LLM</text>

  <rect class="box" x="390" y="545" width="180" height="42"/>
  <text x="410" y="571" class="label">Build APIResponse meta</text>

  <line class="msg" x1="160" y1="175" x2="450" y2="175"/>
  <text x="220" y="164" class="label">1. Request (/risk, /ask, ...)</text>

  <line class="msg" x1="490" y1="240" x2="780" y2="240"/>
  <text x="550" y="229" class="label">2. Select stub/live provider set</text>

  <line class="msg" x1="820" y1="326" x2="1110" y2="326"/>
  <text x="875" y="315" class="label">3. Fetch data + apply rules</text>

  <line class="msg" x1="1150" y1="412" x2="1440" y2="412"/>
  <text x="1218" y="401" class="label">4. Store/event/LLM interactions</text>

  <line class="msg" x1="1440" y1="566" x2="490" y2="566"/>
  <text x="1030" y="555" class="label">5. Return business result</text>

  <line class="msg" x1="450" y1="640" x2="160" y2="640"/>
  <text x="230" y="629" class="label">6. APIResponse(success,data,meta)</text>

  <text x="40" y="732" class="sub">Meta includes: source_mode, generated_at, config_source. In live mode, only provider bindings change.</text>
</svg>
